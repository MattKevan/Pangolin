name: Pangolin
options:
  minimumXcodeGenVersion: 2.38.0
  createIntermediateGroups: true
  developmentLanguage: en
  deploymentTarget:
    macOS: "26.0"
  fileTypes:
    icon:
      file: true
packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/MarkdownUI
    from: 2.4.1
settings:
  base:
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    CLANG_CXX_LANGUAGE_STANDARD: "gnu++20"
    DEVELOPMENT_TEAM: N7J3BYZ94H
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GCC_C_LANGUAGE_STANDARD: gnu17
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
  configs:
    Debug:
      COPY_PHASE_STRIP: NO
      DEBUG_INFORMATION_FORMAT: dwarf
      ENABLE_TESTABILITY: YES
      GCC_OPTIMIZATION_LEVEL: 0
      MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
      ONLY_ACTIVE_ARCH: YES
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG $(inherited)"
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      COPY_PHASE_STRIP: NO
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      ENABLE_NS_ASSERTIONS: NO
      MTL_ENABLE_DEBUG_INFO: NO
      SWIFT_COMPILATION_MODE: wholemodule
targets:
  Pangolin:
    type: application
    supportedDestinations:
      - iOS
      - macOS
    deploymentTarget:
      iOS: "26.0"
      macOS: "26.0"
    sources:
      - path: Pangolin
        excludes:
          - Info.plist
          - Info-iOS.plist
          - Info-macOS.plist
          - Pangolin.entitlements
          - Pangolin-iOS.entitlements
          - Pangolin-macOS.entitlements
    dependencies:
      - package: MarkdownUI
      - sdk: CloudKit.framework
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: Pangolin
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        "ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS[sdk=iphoneos*]": NO
        "ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS[sdk=iphonesimulator*]": NO
        "ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS[sdk=macosx*]": YES
        AUTOMATION_APPLE_EVENTS: NO
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 3
        DEAD_CODE_STRIPPING: YES
        ENABLE_APP_SANDBOX: YES
        ENABLE_FILE_ACCESS_DOWNLOADS_FOLDER: readwrite
        ENABLE_FILE_ACCESS_MOVIES_FOLDER: readwrite
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_INCOMING_NETWORK_CONNECTIONS: NO
        ENABLE_OUTGOING_NETWORK_CONNECTIONS: YES
        ENABLE_PREVIEWS: YES
        ENABLE_RESOURCE_ACCESS_AUDIO_INPUT: NO
        ENABLE_RESOURCE_ACCESS_BLUETOOTH: NO
        ENABLE_RESOURCE_ACCESS_CALENDARS: NO
        ENABLE_RESOURCE_ACCESS_CAMERA: NO
        ENABLE_RESOURCE_ACCESS_CONTACTS: NO
        ENABLE_RESOURCE_ACCESS_LOCATION: NO
        ENABLE_RESOURCE_ACCESS_PHOTO_LIBRARY: NO
        ENABLE_RESOURCE_ACCESS_PRINTING: NO
        ENABLE_RESOURCE_ACCESS_USB: NO
        ENABLE_USER_SELECTED_FILES: readwrite
        GENERATE_INFOPLIST_FILE: YES
        "CODE_SIGN_ENTITLEMENTS[sdk=iphoneos*]": Pangolin/Pangolin-iOS.entitlements
        "CODE_SIGN_ENTITLEMENTS[sdk=iphonesimulator*]": Pangolin/Pangolin-iOS.entitlements
        "CODE_SIGN_ENTITLEMENTS[sdk=macosx*]": Pangolin/Pangolin-macOS.entitlements
        "INFOPLIST_FILE[sdk=iphoneos*]": Pangolin/Info-iOS.plist
        "INFOPLIST_FILE[sdk=iphonesimulator*]": Pangolin/Info-iOS.plist
        "INFOPLIST_FILE[sdk=macosx*]": Pangolin/Info-macOS.plist
        INFOPLIST_KEY_CFBundleDisplayName: "Pangolin video manager"
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Pangolin uses speech recognition to generate transcripts of your video content, making it searchable and accessible."
        "INFOPLIST_KEY_UIApplicationSceneManifest_Generation[sdk=iphoneos*]": YES
        "INFOPLIST_KEY_UIApplicationSceneManifest_Generation[sdk=iphonesimulator*]": YES
        "INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents[sdk=iphoneos*]": YES
        "INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents[sdk=iphonesimulator*]": YES
        "INFOPLIST_KEY_UILaunchScreen_Generation[sdk=iphoneos*]": YES
        "INFOPLIST_KEY_UILaunchScreen_Generation[sdk=iphonesimulator*]": YES
        "INFOPLIST_KEY_UIStatusBarStyle[sdk=iphoneos*]": UIStatusBarStyleDefault
        "INFOPLIST_KEY_UIStatusBarStyle[sdk=iphonesimulator*]": UIStatusBarStyleDefault
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/Frameworks"
        "LD_RUNPATH_SEARCH_PATHS[sdk=macosx*]": "@executable_path/../Frameworks"
        MARKETING_VERSION: 1.0.2
        PRODUCT_BUNDLE_IDENTIFIER: com.newindustries.pangolin
        PRODUCT_NAME: "$(TARGET_NAME)"
        REGISTER_APP_GROUPS: YES
        RUNTIME_EXCEPTION_ALLOW_DYLD_ENVIRONMENT_VARIABLES: NO
        RUNTIME_EXCEPTION_ALLOW_JIT: NO
        RUNTIME_EXCEPTION_ALLOW_UNSIGNED_EXECUTABLE_MEMORY: NO
        RUNTIME_EXCEPTION_DEBUGGING_TOOL: NO
        RUNTIME_EXCEPTION_DISABLE_EXECUTABLE_PAGE_PROTECTION: NO
        RUNTIME_EXCEPTION_DISABLE_LIBRARY_VALIDATION: NO
        SUPPORTS_MACCATALYST: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2,7"
    preBuildScripts:
      - name: Copy Downloader Runtime
        inputFiles:
          - $(SRCROOT)/.vendor/downloader-runtime/VERSIONS.txt
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/Tools
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/Tools/.copy-complete
        script: |
          set -eu

          SRC_TOOLS="$SRCROOT/.vendor/downloader-runtime"
          DST_ROOT="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH"
          DST_TOOLS="$DST_ROOT/Tools"

          if [ ! -d "$SRC_TOOLS" ]; then
            echo "No vendored downloader runtime at $SRC_TOOLS (skipping)"
            exit 0
          fi

          mkdir -p "$DST_TOOLS"

          find "$DST_TOOLS" -mindepth 1 -maxdepth 1 -exec rm -rf {} \; 2>/dev/null || true

          ditto "$SRC_TOOLS" "$DST_TOOLS"

          chmod 755 "$DST_TOOLS/ffmpeg" 2>/dev/null || true
          chmod 755 "$DST_TOOLS/ffprobe" 2>/dev/null || true
          find "$DST_TOOLS" -type f \( -path "*/python/bin/python*" -o -path "*/python/bin/python*-config" \) -exec chmod 755 {} \; 2>/dev/null || true
          chmod 644 "$DST_TOOLS/site-packages/bin/yt-dlp" 2>/dev/null || true

          touch "$DST_TOOLS/.copy-complete"
      - name: Sign Downloader Runtime
        inputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/Tools/.copy-complete
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/Tools/.sign-complete
        script: |
          set -eu

          RESOURCE_ROOT="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH"
          TOOLS="$RESOURCE_ROOT/Tools"
          if [ ! -d "$TOOLS" ]; then
            exit 0
          fi

          xattr -dr com.apple.quarantine "$TOOLS" 2>/dev/null || true
          chmod 644 "$TOOLS/site-packages/bin/yt-dlp" 2>/dev/null || true

          if [ "${CODE_SIGNING_ALLOWED:-NO}" = "YES" ] && [ -n "${EXPANDED_CODE_SIGN_IDENTITY:-}" ]; then
            find "$TOOLS" -type f | while IFS= read -r f; do
              if /usr/bin/file -b "$f" | /usr/bin/grep -q "Mach-O"; then
                /usr/bin/codesign --force --sign "$EXPANDED_CODE_SIGN_IDENTITY" --options runtime --timestamp=none "$f"
              fi
            done
          fi

          touch "$TOOLS/.sign-complete"
    scheme:
      testTargets:
        - PangolinTests
        - PangolinUITests
  PangolinTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget:
      macOS: "26.0"
    sources:
      - path: PangolinTests
    dependencies:
      - target: Pangolin
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 2
        DEAD_CODE_STRIPPING: YES
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: 1.0.1
        PRODUCT_BUNDLE_IDENTIFIER: com.newindustries.pangolinTests
        PRODUCT_NAME: "$(TARGET_NAME)"
        SWIFT_EMIT_LOC_STRINGS: NO
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: 7
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Pangolin.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Pangolin
  PangolinUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget:
      macOS: "26.0"
    sources:
      - path: PangolinUITests
    dependencies:
      - target: Pangolin
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 2
        DEAD_CODE_STRIPPING: YES
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: 1.0.1
        PRODUCT_BUNDLE_IDENTIFIER: com.newindustries.pangolinUITests
        PRODUCT_NAME: "$(TARGET_NAME)"
        SWIFT_EMIT_LOC_STRINGS: NO
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: 7
        TEST_TARGET_NAME: Pangolin
